  <text x="100" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="900" letter-spacing="4" text-anchor="middle" fill="#000000" filter="url(#logoShadow)">TIDYAI</text>
</svg>
